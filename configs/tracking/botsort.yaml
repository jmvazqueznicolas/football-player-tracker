# BoT-SORT tracker config (Ultralytics defaults, tuned for football).
tracker_type: botsort
track_high_thresh: 0.5
track_low_thresh: 0.1
new_track_thresh: 0.6
track_buffer: 30
match_thresh: 0.8
# ReID can be enabled by Ultralytics if a model is provided. Off for v1.
gmc_method: sparseOptFlow
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: false
