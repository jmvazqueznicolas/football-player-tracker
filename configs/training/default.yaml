# Default Ultralytics training hyperparameters.
# These map directly to YOLO.train(**training) kwargs.
epochs: 50
batch: 16
imgsz: 640
patience: 20
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1
# Augmentations
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
# Device: null = auto-detect (MPS on Mac, CUDA on Linux, else CPU).
# Override via CLI: training.device=mps  or  training.device=0
device: null
workers: 8
cache: false
amp: true
